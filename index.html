<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Genius</title>
  </head>
  <body>
    <main class="container">
      <h1>Genius</h1>

      <p class="level">Nível: <span id="level">0</span></p>

      <div class="game">
        <div class="btn green" id="green"></div>
        <div class="btn red" id="red"></div>
        <div class="btn yellow" id="yellow"></div>
        <div class="btn blue" id="blue"></div>
      </div>

      <button id="start">Iniciar Jogo</button>
      <p id="message"></p>
    </main>
    <script src="script.js"></script>
  </body>
</html>
